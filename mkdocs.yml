site_name: SIGGD Docs
site_url: https://PurdueSIGGD.github.io/SIGGD-Docs/
site_author: Purdue SIGGD
site_description: >-
  Documentation, tutorials, and resources for Purdue's Special Interest Group
  in Game Development.

repo_name: PurdueSIGGD/SIGGD-Docs
repo_url: https://github.com/PurdueSIGGD/SIGGD-Docs
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 – present Purdue SIGGD

hooks:
  - hooks/author_attribution.py

# ── Theme ──────────────────────────────────────────────────────────────────────
# Overriden by assets/stylesheets/extra.css for custom colors; make changes there
theme:
  name: material
  favicon: assets/images/favicon.png
  language: en

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    # Search
    - search.highlight
    - search.suggest
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags:
      tags_file: tags.md
  - git-authors:
      show_contribution: true
      show_line_count: true
      count_empty_lines: false
      fallback_to_empty: false
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

# ── Navigation ────────────────────────────────────────────────────────────────
nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Programming:
          - tutorials/programming/index.md
      - Art & Assets:
          - tutorials/art-and-assets/index.md
      - Audio:
          - tutorials/audio/index.md
      - General:
          - tutorials/general/index.md
  - Projects:
      - projects/index.md
      - 26-27 Game:
          - Overview: projects/2627-game/index.md
          - Codebase:
              - projects/2627-game/codebase/index.md
              - Systems: projects/2627-game/codebase/systems/index.md
              - Scripts: projects/2627-game/codebase/scripts/index.md
          - Team: projects/2627-game/team.md
  - Resources:
      - resources/index.md
      - Tools: resources/tools.md
      - External References: resources/external-references.md
  - Contributing:
      - contributing/index.md
      - Style Guide: contributing/style-guide.md
      - Markdown Cheatsheet: contributing/markdown-cheatsheet.md
      - Templates:
          - Tutorial Template: contributing/templates/tutorial-template.md
          - Project Template: contributing/templates/project-template.md
          - Codebase Template: contributing/templates/codebase-template.md
          - System Template: contributing/templates/system-template.md
          - Script Template: contributing/templates/script-template.md
          - Resource Template: contributing/templates/resource-template.md
  - About:
      - about/index.md
      - Contributors: about/contributors.md

# ── Markdown Extensions ───────────────────────────────────────────────────────
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ── Extra ──────────────────────────────────────────────────────────────────────
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PurdueSIGGD
      name: PurdueSIGGD on GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/REPLACE_WITH_INVITE
      name: Join our Discord
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognise your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for.

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
